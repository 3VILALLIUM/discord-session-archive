name: Privacy Guard

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privacy_guard:
    name: Privacy Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (org-policy compliant)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_BEFORE: ${{ github.event.before }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git fetch --no-tags origin "${GH_SHA}"
          if [[ "${GH_EVENT_NAME}" == "pull_request" && -n "${GH_BASE_SHA}" ]]; then
            git fetch --no-tags origin "${GH_BASE_SHA}"
          elif [[ -n "${GH_BEFORE}" && "${GH_BEFORE}" != "0000000000000000000000000000000000000000" ]]; then
            git fetch --no-tags origin "${GH_BEFORE}"
          fi
          git checkout --detach "${GH_SHA}"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Run git identity guard
        shell: bash
        env:
          ALLOW_GITHUB_ACTIONS_COMMITTER: ${{ github.event_name == 'push' && '1' || '0' }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        run: |
          if [[ "${GH_EVENT_NAME}" == "pull_request" && -n "${GH_BASE_SHA}" && -n "${GH_HEAD_SHA}" ]]; then
            bash scripts/git_identity_guard.sh range "${GH_BASE_SHA}..${GH_HEAD_SHA}"
          elif [[ -n "${GH_BEFORE}" && "${GH_BEFORE}" != "0000000000000000000000000000000000000000" ]]; then
            bash scripts/git_identity_guard.sh range "${GH_BEFORE}..${GH_SHA}"
          else
            bash scripts/git_identity_guard.sh commits "${GH_SHA}"
          fi

      - name: Run privacy guard
        shell: bash
        run: bash scripts/privacy_guard_check.sh

      - name: Run PR action policy guard
        shell: bash
        run: bash scripts/pr_action_policy_check.sh

      - name: Run PR action policy guard PowerShell parity
        shell: pwsh
        run: ./scripts/pr_action_policy_check.ps1

      - name: Run docs consistency check
        shell: pwsh
        run: ./scripts/docs_consistency_check.ps1 -ValidateTroubleshooting

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock.txt

      - name: Dependency health check
        shell: bash
        run: python -m pip check

      - name: Dependency vulnerability scan
        shell: bash
        run: python -m pip_audit --progress-spinner off

      - name: Compile smoke check
        shell: bash
        run: python -m compileall src tests

      - name: Run tests
        shell: bash
        run: python -m pytest -q
