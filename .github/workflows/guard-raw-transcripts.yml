name: Privacy Guard

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privacy_guard:
    name: Privacy Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (org-policy compliant)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git fetch --no-tags origin "${GH_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run privacy guard
        shell: bash
        run: bash scripts/privacy_guard_check.sh

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Dependency health check
        shell: bash
        run: python -m pip check

      - name: Compile smoke check
        shell: bash
        run: python -m compileall src tests

      - name: Run tests
        shell: bash
        run: python -m pytest -q
