name: Privacy Guard

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privacy_guard:
    name: Privacy Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (org-policy compliant)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git fetch --no-tags --depth=1 origin "${GH_REF}"
          git checkout --detach FETCH_HEAD

      - name: Run privacy guard
        shell: bash
        run: bash scripts/privacy_guard_check.sh
